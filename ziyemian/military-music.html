<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中山国军事档案库 · 战术战法</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <!-- 统一引入样式文件 -->
    <link rel="stylesheet" href="../css/unified-styles.css">

    <style>
        :root {
            --primary-dark: var(--color-paper-dark);
            --accent-gold: var(--color-gold-warm);
            --vinyl-black: #121212;
            --shadow-deep: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--primary-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }



        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center top, #1a1a1a 0%, #050505 60%);
        }

        .stage {
            padding: 170px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .turntable {
            position: relative;
            width: 460px;
            height: 460px;
            background: #181818;
            border-radius: 20px;
            box-shadow: var(--shadow-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #222;
            margin-bottom: 20px;
        }

        .platter-edge {
            width: 400px;
            height: 400px;
            background: conic-gradient(#333, #111, #333, #111, #333);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .vinyl {
            width: 380px;
            height: 380px;
            background: #080808;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid #000;
        }

        .record {
            width: 100%; height: 100%;
            background: repeating-radial-gradient(circle, #1a1a1a 0px, #1a1a1a 1px, #080808 2px, #080808 3px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
            position: relative;
        }

        .cover-box {
            position: relative;
            width: 130px; height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid #111;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            background: #222;
        }

        .cover { width: 100%; height: 100%; object-fit: cover; }

        .tonearm-container { position: absolute; top: 30px; right: 30px; z-index: 20; }
        .arm-pivot { width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #555, #111); border-radius: 50%; border: 1px solid #333; }
        .arm-rod {
            position: absolute; top: 25px; right: 25px; width: 220px; height: 8px;
            background: linear-gradient(to bottom, #999, #333, #666);
            border-radius: 5px; transform-origin: 200px center;
            transform: rotate(-38deg); transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .arm-head { position: absolute; left: -10px; top: -5px; width: 30px; height: 18px; background: #222; border-radius: 4px; transform: rotate(20deg); }

        .shelf-container {
            width: 100%;
            background: rgba(0,0,0,0.2);
            padding: 80px 0 150px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        .shelf-title {
            text-align: center;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: #444;
            letter-spacing: 6px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .album-shelf {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 45px;
            padding: 60px 80px;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .album-shelf::-webkit-scrollbar { display: none; }

        .album-item {
            flex: 0 0 160px;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s ease;
        }

        .inner-vinyl {
            position: absolute;
            top: 5px; width: 140px; height: 140px;
            background: repeating-radial-gradient(circle, #1a1a1a 0px, #1a1a1a 1px, #080808 2px, #080808 3px);
            border-radius: 50%;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            opacity: 0.8;
        }

        .inner-vinyl::after {
            content: ''; width: 40px; height: 40px; border-radius: 50%;
            background: var(--card-color, var(--accent-gold));
            opacity: 0.3;
        }

        .sleeve {
            position: relative;
            width: 155px; height: 155px;
            background: var(--card-bg, #222);
            border-radius: 4px;
            z-index: 2;
            overflow: hidden;
            box-shadow: 8px 10px 25px rgba(0,0,0,0.6);
            border: 1px solid var(--card-border, rgba(255,255,255,0.1));
            transition: all 0.4s ease;
        }

        .sleeve img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: filter 0.4s; }

        .album-item:hover .inner-vinyl { transform: translateY(-58px) rotate(12deg); opacity: 1; }
        .album-item:hover .sleeve { transform: scale(1.02); border-color: var(--card-color); box-shadow: 0 15px 35px var(--card-shadow); }
        .album-item:hover img { filter: brightness(0.6) saturate(1.2); }
        .album-item:hover .album-title { color: var(--card-color); }

        .album-info { margin-top: 15px; text-align: center; }
        .album-title { font-size: 0.85rem; color: #eee; font-family: 'Noto Serif SC', serif; margin-bottom: 2px; white-space: nowrap; transition: 0.3s;}
        .album-artist { font-size: 0.65rem; color: #666; letter-spacing: 1px; text-transform: uppercase; }

        .album-item.active .sleeve { border: 2px solid var(--card-color); box-shadow: 0 0 15px var(--card-shadow); }
        .album-item.active .album-title { color: var(--card-color); font-weight: bold; }

        .controls {
            height: 120px;
            background: rgba(15, 15, 15, 0.95);
            display: flex;
            align-items: center;
            padding: 0 60px;
            gap: 50px;
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(30px);
            z-index: 100;
            position: sticky;
            bottom: 0;
        }

        .info { width: 250px; overflow: hidden; }
        .info h3 { color: var(--accent-gold); font-family: 'Noto Serif SC', serif; font-size: 1.1rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { color: #555; font-size: 0.75rem; letter-spacing: 1px; }

        .viz-box { flex: 1; height: 50px; }
        #viz { width: 100%; height: 100%; opacity: 0.6; }

        .play-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent-gold); border: none; color: #fff;
            cursor: pointer; font-size: 1.2rem; transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.2);
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 10px 40px rgba(212, 165, 116, 0.4); }

        body.is-playing .record { animation-play-state: running; }
        body.is-playing .arm-rod { transform: rotate(-12deg); }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .status-tag { font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-right: 20px; }
        
        .header-left {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body id="mainBody">

    <!-- 统一导航栏 -->
    <nav class="magazine-nav">
        <a href="../pages/military.html" class="back-home">返回</a>
        <div class="season-nav">
            <a href="battle.html">经典战役</a>
            <a href="spring.html">兵力规模</a>
            <a href="troop-type.html">兵种构成</a>
            <a href="weapon-melee.html">近战兵器</a>
            <a href="weapon-ranged.html">远程兵器</a>
            <a href="military-music.html" class="active">战术战法</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="stage">
            <div class="turntable">
                <div class="platter-edge">
                    <div class="vinyl">
                        <div class="record" id="mainRecord">
                            <div class="cover-box">
                                <img id="albumArt" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400" class="cover" alt="战术档案封面">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tonearm-container">
                    <div class="arm-pivot"></div>
                    <div class="arm-rod"><div class="arm-head"></div></div>
                </div>
            </div>
            
            <div style="margin-top: 10px; color: #444; font-size: 0.7rem; letter-spacing: 2px;">
                <span id="statusTag" class="status-tag">档案就绪</span>
                SCROLL DOWN TO VIEW TACTICAL ARCHIVES
            </div>
        </div>

        <div class="shelf-container">
            <div class="shelf-title">TACTICAL ARCHIVES / 战术档案库</div>
            <div class="album-shelf" id="albumShelf">
                <!-- 档案 1：山地战术 -->
                <div class="album-item active" 
                     style="--card-color: #D4A574; --card-bg: #2a241e; --card-shadow: rgba(212, 165, 116, 0.4);"
                     onclick="selectAlbum(0, '山地游击战术', '轻装步兵', '../assets/audio/山地游击战术.mp3', '../assets/images/military/22.png')">
                    <div class="inner-vinyl"></div>
                    <div class="sleeve"><img src="../assets/images/military/22.png"></div>
                    <div class="album-info"><div class="album-title">山地游击战术</div><div class="album-artist">轻装步兵</div></div>
                </div>

                <!-- 档案 2：水网战术 -->
                <div class="album-item" 
                     style="--card-color: #7d8aff; --card-bg: #1a1b2e; --card-shadow: rgba(125, 138, 255, 0.4);"
                     onclick="selectAlbum(1, '水网地带作战', '舟桥部队', '../assets/audio/水网地带作战.mp3', '../assets/images/military/23.png')">
                    <div class="inner-vinyl"></div>
                    <div class="sleeve"><img src="../assets/images/military/23.png"></div>
                    <div class="album-info"><div class="album-title">水网地带作战</div><div class="album-artist">舟桥部队</div></div>
                </div>

                <!-- 档案 3：城防战术 -->
                <div class="album-item" 
                     style="--card-color: #ff5e5e; --card-bg: #2e1a1a; --card-shadow: rgba(255, 94, 94, 0.4);"
                     onclick="selectAlbum(2, '城池攻防战法', '重装步兵', '../assets/audio/城池攻防战法.mp3', '../assets/images/military/24.png')">
                    <div class="inner-vinyl"></div>
                    <div class="sleeve"><img src="../assets/images/military/24.png"></div>
                    <div class="album-info"><div class="album-title">城池攻防战法</div><div class="album-artist">重装步兵</div></div>
                </div>

                <!-- 档案 4：骑兵战术 -->
                <div class="album-item" 
                     style="--card-color: #5effda; --card-bg: #1a2e2a; --card-shadow: rgba(94, 255, 218, 0.4);"
                     onclick="selectAlbum(3, '骑兵奔袭战术', '轻骑兵', '../assets/audio/骑兵奔袭战术.mp3', '../assets/images/military/25.png')">
                    <div class="inner-vinyl"></div>
                    <div class="sleeve"><img src="../assets/images/military/25.png"></div>
                    <div class="album-info"><div class="album-title">骑兵奔袭战术</div><div class="album-artist">轻骑兵</div></div>
                </div>

                <!-- 档案 5：阵法战术 -->
                <div class="album-item" 
                     style="--card-color: #8eff5e; --card-bg: #1e2e1a; --card-shadow: rgba(142, 255, 94, 0.4);"
                     onclick="selectAlbum(4, '方阵协同战法', '中军主力', '../assets/audio/方阵协同战法.mp3', '../assets/images/military/26.png')">
                    <div class="inner-vinyl"></div>
                    <div class="sleeve"><img src="../assets/images/military/26.png"></div>
                    <div class="album-info"><div class="album-title">方阵协同战法</div><div class="album-artist">中军主力</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="info">
            <h3 id="curTitle">档案就绪</h3>
            <p id="curArtist">选择战术档案或启动分析</p>
        </div>
        <div class="viz-box"><canvas id="viz"></canvas></div>
        <button class="play-btn" id="playToggle"><i class="fas fa-play" id="icon"></i></button>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('player');
        const playBtn = document.getElementById('playToggle');
        const icon = document.getElementById('icon');
        const body = document.getElementById('mainBody');
        const statusTag = document.getElementById('statusTag');
        const curTitle = document.getElementById('curTitle');
        const curArtist = document.getElementById('curArtist');
        const albumArt = document.getElementById('albumArt');
        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        const shelf = document.getElementById('albumShelf');
        // 导航栏功能已集成到magazine-nav中

        const defaultCover = "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400";
        const defaultUrl = "./music/song1.mp3";
        
        let audioCtx, analyser, source, dataArray;
        let oscillator, isSynthesized = false;

        // 导航栏功能已集成到magazine-nav中，返回功能通过back-home链接实现

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            try {
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
            } catch(e) {}
            loop();
        }

        function loop() {
            requestAnimationFrame(loop);
            if (!audio.paused || isSynthesized) {
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const step = canvas.width / dataArray.length;
                const activeItem = document.querySelector('.album-item.active') || document.querySelector('.album-item');
                const color = activeItem ? getComputedStyle(activeItem).getPropertyValue('--card-color') : '#D4A574';
                ctx.fillStyle = color;
                dataArray.forEach((v, i) => {
                    const h = (v / 255) * canvas.height;
                    ctx.globalAlpha = v/255 * 0.5 + 0.1;
                    ctx.fillRect(i * step, canvas.height - h, step - 4, h);
                });
            }
        }

        function scrollToTurntable() {
            const stage = document.querySelector('.stage');
            if (stage) {
                stage.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function selectAlbum(index, title, artist, url, cover) {
            console.log('尝试加载档案:', url);
            console.log('页面URL:', window.location.href);
            console.log('完整路径:', new URL(url, window.location.href).href);
            
            const items = document.querySelectorAll('.album-item');
            items.forEach(item => item.classList.remove('active'));
            if(items[index]) items[index].classList.add('active');

            stopSynth();
            audio.src = url;
            curTitle.innerText = title;
            curArtist.innerText = artist;
            albumArt.src = cover;

            const themeColor = items[index].style.getPropertyValue('--card-color');
            document.documentElement.style.setProperty('--accent-gold', themeColor);

            // Scroll to turntable
            scrollToTurntable();

            initAudio();
            audio.play().then(() => {
                statusTag.innerText = "档案已选定";
                updateUI(true);
                console.log('加载成功!');
            }).catch(err => {
                console.error('加载错误详情:', err);
                statusTag.innerText = "档案加载失败";
                
                // 测试文件是否存在
                fetch(url)
                    .then(response => {
                        console.log('文件状态码:', response.status);
                        if (!response.ok) {
                            alert(`错误: 档案不存在 (状态码: ${response.status})\n路径: ${url}\n\n请确保:\n1. 使用Live Server运行\n2. music/文件夹中有音频文件\n3. 文件名为song1.mp3等`);
                        } else {
                            alert(`档案存在但无法加载:\n${err.message}`);
                        }
                    })
                    .catch(fetchErr => {
                        console.error('档案测试失败:', fetchErr);
                        alert(`无法访问档案: ${url}\n请使用VS Code的Live Server运行页面！`);
                    });
            });
        }

        function stopSynth() { if (oscillator) { oscillator.stop(); oscillator.disconnect(); isSynthesized = false; } }

        async function toggle() {
            initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (audio.paused) {
                if (!audio.src || audio.src === window.location.href) {
                    selectAlbum(0, '山地游击战术', '轻装步兵', defaultUrl, defaultCover);
                } else { 
                    audio.play().then(() => updateUI(true)).catch(err => {
                        console.error('播放错误:', err);
                        statusTag.innerText = "档案解析失败";
                    }); 
                }
            } else { audio.pause(); updateUI(false); }
        }

        function updateUI(playing) {
            body.classList.toggle('is-playing', playing);
            icon.className = playing ? 'fas fa-pause' : 'fas fa-play';
        }

        playBtn.addEventListener('click', toggle);

        window.onresize = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        };
        window.onresize();

        shelf.addEventListener('wheel', (evt) => {
            if (evt.deltaY !== 0) {
                evt.preventDefault();
                shelf.scrollLeft += evt.deltaY;
            }
        });

        window.addEventListener('load', function() {
            audio.src = defaultUrl;
            console.log('页面加载完成，使用Live Server运行了吗？');
            console.log('如果没有，请安装VS Code Live Server扩展并点击Go Live按钮！');
        });

        // 添加键盘快捷键支持
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                toggle();
            }
            if (e.code === 'ArrowLeft') {
                shelf.scrollLeft -= 100;
            }
            if (e.code === 'ArrowRight') {
                shelf.scrollLeft += 100;
            }
        });
    </script>
</body>
</html>
